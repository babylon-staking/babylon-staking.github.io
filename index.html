<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Babylon Staking - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Babylon Staking DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://babylon-staking.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root{
  --bg:#090A0F;
  --panel:#10121A;
  --panel-2:#151824;
  --ink:#F6F7FB;
  --muted:#A7ACBA;
  --faint:#747B8F;
  --line:rgba(255,255,255,.12);
  --line-strong:rgba(255,255,255,.2);
  --accent:#9391F7;
  --accent-ink:#0A0B11;
  --accent-soft:rgba(147,145,247,.15);
  --shadow:0 28px 80px -46px rgba(0,0,0,.9);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-height:100dvh;
  overflow:hidden;
  color:var(--ink);
  background:
    linear-gradient(180deg, rgba(147,145,247,.09), transparent 34%),
    var(--bg);
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  display:grid;
  grid-template-rows:auto 1fr auto;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
p,h1{margin:0}

.topbar{
  display:flex;
  align-items:center;
  gap:18px;
  height:70px;
  padding:0 clamp(18px,4vw,44px);
}
.brand{
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-size:1.02rem;
  font-weight:800;
  color:var(--ink);
  white-space:nowrap;
}
.brand img{
  width:28px;
  height:28px;
  border-radius:8px;
  border:1px solid var(--line);
}
.nav{
  display:flex;
  align-items:center;
  gap:24px;
  margin-left:10px;
}
.nav a{
  color:var(--muted);
  font-size:.92rem;
  font-weight:550;
  transition:color .16s ease;
}
.nav a:hover{color:var(--ink)}
.spacer{flex:1}
.ghost{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:0 17px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  color:var(--ink);
  background:rgba(255,255,255,.03);
  font-size:.9rem;
  font-weight:750;
  white-space:nowrap;
  transition:border-color .16s ease, transform .16s ease, background .16s ease;
}
.ghost:hover{
  border-color:var(--accent);
  background:var(--accent-soft);
  transform:translateY(-1px);
}

.stage{
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:18px clamp(18px,4vw,44px) 10px;
}
.hero{
  width:min(720px,100%);
}
h1{
  font-size:clamp(2.72rem,6.2vw,5.2rem);
  line-height:.98;
  letter-spacing:0;
  font-weight:850;
}
.sub{
  max-width:56ch;
  margin:18px auto 0;
  color:var(--muted);
  font-size:clamp(1rem,1.55vw,1.18rem);
  line-height:1.55;
}
.sub strong{
  color:var(--ink);
  font-weight:800;
  box-shadow:inset 0 -.46em 0 var(--accent-soft);
}

.card{
  width:min(536px,100%);
  margin-top:30px;
  padding:20px;
  border:1px solid var(--line);
  border-radius:8px;
  background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025)), var(--panel);
  box-shadow:var(--shadow);
}
.card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin-bottom:14px;
  text-align:left;
}
.eyebrow{
  color:var(--accent);
  font-size:.74rem;
  font-weight:850;
  letter-spacing:.14em;
  text-transform:uppercase;
}
.status{
  color:var(--faint);
  font-size:.82rem;
  font-weight:650;
}
.stake-flow{
  display:grid;
  grid-template-columns:1fr 42px 1fr;
  align-items:stretch;
  gap:12px;
}
.leg{
  min-width:0;
  padding:15px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--panel-2);
  text-align:left;
}
.label{
  display:block;
  color:var(--faint);
  font-size:.68rem;
  font-weight:800;
  letter-spacing:.1em;
  text-transform:uppercase;
}
.chip,.destination{
  display:flex;
  align-items:center;
  min-height:34px;
  margin-top:9px;
  font-size:1.08rem;
  font-weight:850;
}
.chip{
  gap:10px;
}
.icon{
  width:30px;
  height:30px;
  border-radius:50%;
  box-shadow:0 0 0 1px rgba(255,255,255,.18);
}
.switch{
  align-self:center;
  width:42px;
  height:42px;
  border-radius:50%;
  border:1px solid var(--line-strong);
  color:var(--accent);
  background:#0C0D14;
  display:grid;
  place-items:center;
  cursor:pointer;
  transition:transform .18s ease, border-color .18s ease, background .18s ease;
}
.switch span{
  display:block;
  font-size:1.08rem;
  line-height:1;
  transition:transform .18s ease;
}
.switch:hover{
  border-color:var(--accent);
  background:var(--accent-soft);
  transform:translateY(-1px);
}
.card.is-review .switch span{transform:rotate(180deg)}
.card.is-review .leg{border-color:rgba(147,145,247,.42)}
.primary{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100%;
  min-height:54px;
  margin-top:16px;
  border-radius:8px;
  background:var(--accent);
  color:var(--accent-ink);
  font-size:1rem;
  font-weight:850;
  transition:filter .16s ease, transform .16s ease;
}
.primary:hover{
  filter:brightness(1.04);
  transform:translateY(-1px);
}
.note{
  margin-top:11px;
  color:var(--faint);
  font-size:.78rem;
  line-height:1.45;
}

.footer{
  padding:0 24px 22px;
  text-align:center;
  color:var(--faint);
  font-size:.84rem;
}
.footer b{
  color:var(--muted);
  font-weight:750;
}

@media(max-width:620px){
  .topbar{
    height:62px;
    gap:10px;
    padding:0 16px;
  }
  .brand span{font-size:.96rem}
  .nav{display:none}
  .ghost{
    min-height:36px;
    padding:0 13px;
    font-size:.84rem;
  }
  .stage{
    justify-content:start;
    padding:28px 16px 8px;
  }
  h1{
    font-size:3rem;
    line-height:1;
  }
  .sub{
    margin-top:14px;
    font-size:.98rem;
    line-height:1.48;
  }
  .card{
    margin-top:24px;
    padding:16px;
  }
  .stake-flow{
    grid-template-columns:1fr;
    gap:10px;
  }
  .switch{
    justify-self:center;
    width:40px;
    height:40px;
  }
  .switch span{transform:rotate(90deg)}
  .card.is-review .switch span{transform:rotate(270deg)}
  .leg{
    padding:13px 14px;
  }
  .primary{
    min-height:50px;
    margin-top:14px;
  }
  .footer{
    padding-bottom:16px;
    font-size:.8rem;
  }
}

@media(max-width:380px){
  .stage{padding-top:22px}
  h1{font-size:2.72rem}
  .sub{font-size:.94rem}
  .card{margin-top:20px}
  .note{font-size:.74rem}
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Babylon Staking</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Babylon Staking</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Babylon Staking &mdash; 2026</footer>
</body>
</html>
